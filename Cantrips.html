                        box-sizing: border-box;
                        font-size: 0.8rem; /* Slightly larger font */
                        vertical-align: top;
                        page-break-inside: avoid;
                        background-image: url('SmallLogo_Black_NoBG.png');
                        background-size: 75%;
                        background-repeat: no-repeat;
                        background-position: top right;
                        
                        /* Differentiation Styling */
                        border: 1px solid #e2e8f0; /* Subtle border */
                        border-radius: 12px;
                        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
                        background-color: white; /* White card background */
                    }
                    
                    /* Table Structure for Layout */
                    #exportTable {
                        border-collapse: separate;
                        border-spacing: 10px 10px; /* Space between cards */
                        border: none; /* Remove table border */
                    }
                    
                    /* Remove cell default borders in HTML export */
                    #exportTable td, #exportTable th {
                        border: none !important;
                        vertical-align: top;
                    }

                    /* Header Styling */
                    #exportTable thead th {
                        background-color: #4f46e5;
                        color: white;
                        font-family: 'Inter', sans-serif;
                        font-size: 1.0rem;
                        font-weight: 500;
                        padding: 15px;
                        border-radius: 10px;
                    }

                    /* Individual Cantrip Content Styling */
                    .text-gray-900 { color: #1f2937 !important; }
                    .font-extrabold { font-weight: 800; }
                    .font-verbal {font-weight: 200; font-style: italic;}
                    .font-description { font-weight: 100; font-size: 90%; font-family: 'Tahoma', sans-serif; text-align: justify; }
                    .font-normal { font-weight: 400; }
                    .text-gray-700 { color: #4a5568; }
                    .text-gray-600 { color: #718096; }
                    .border-t { border-top: 1px solid #e2e8f0; }

                </style>
            `;

            // The exportElement already contains the table structure
            const fullHTML = `<!DOCTYPE html><html><head><title>${filename}</title>${injectedStyles}</head><body>${element.innerHTML}</body></html>`;

            const blob = new Blob([fullHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${filename}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        /**
         * Generates and downloads a CSV file (representing the XLSX format).
         */
        function exportAsCSV(filename, data) {
            const headers = ['Name', 'Celestial', 'Earth', 'Nature', 'Type', 'Duration', 'Cost', 'Tag', 'Verbal', 'Description'];
            
            // Header for CSV
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += `Adventure: "${document.getElementById('adventureTitle').value}"\n\n`;
            // Removed: Total Production Cost line from CSV
            csvContent += headers.join(',') + '\n';

            // Data rows
            data.forEach(c => {
                const row = headers.map(header => {
                    const key = header.toLowerCase();
                    let value = c[key] !== undefined ? c[key] : c[key.replace(/\s/g, '').toLowerCase()];
                    
                    // Escape internal quotes and wrap in quotes for robust CSV
                    if (typeof value === 'string') {
                        // Replace newlines and tabs with spaces for cleaner CSV
                        value = value.replace(/(\r\n|\n|\r|\t)/gm, " ");
                        value = `"${value.replace(/"/g, '""')}"`;
                    } else if (typeof value === 'boolean') {
                        value = value ? 'Yes' : 'No';
                    }
                    return value;
                }).join(',');
                csvContent += row + '\n';
            });

            // Create download link
            const encodedUri = encodeURI(csvContent);
            const a = document.createElement('a');
            a.href = encodedUri;
            a.download = `${filename}.csv`; // Use .csv for universal Excel compatibility
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            // NOTE: URL.revokeObjectURL(url); is not needed here as no local URL was created for the encoded URI
        }

        // --- Initial Load ---
        document.addEventListener('DOMContentLoaded', () => {
            const eventVars = window.EventVariables?.get?.();
            const eventTitle = window.EventVariables?.buildTitle?.(eventVars);
            const adventureTitleInput = document.getElementById('adventureTitle');
            if (adventureTitleInput && !adventureTitleInput.value.trim() && eventTitle) {
                adventureTitleInput.value = eventTitle;
            }

            applyFilters(); // Call applyFilters to initially render the list
            updateExportData();
        });

    </script>
</body>
</html>
